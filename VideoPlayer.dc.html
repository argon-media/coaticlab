<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  @keyframes vp-pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.55;}70%{transform:translate(-50%,-50%) scale(1.55);opacity:0;}100%{opacity:0;}}
</style>
</helmet>
<div style="position:relative;width:100%;height:100%;background:#000;overflow:hidden;">
  <sc-if value="{{ playing }}">
    <video src="{{ src }}" poster="{{ poster }}" controls autoplay playsinline style="width:100%;height:100%;display:block;object-fit:cover;background:#000;"></video>
  </sc-if>
  <sc-if value="{{ idle }}" hint-placeholder-val="{{ true }}">
    <button onClick="{{ play }}" aria-label="Play video" style="appearance:none;border:0;padding:0;margin:0;cursor:pointer;display:block;width:100%;height:100%;position:relative;background:#000;">
      <img src="{{ poster }}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
      <span style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.14) 0%,rgba(0,0,0,0) 32%,rgba(0,0,0,.5) 100%);"></span>
      <span style="position:absolute;top:50%;left:50%;width:84px;height:84px;border-radius:50%;border:2px solid rgba(255,255,255,0.55);transform:translate(-50%,-50%);animation:vp-pulse 2.6s ease-out infinite;pointer-events:none;"></span>
      <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,0.95);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 38px rgba(0,0,0,.45);">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#15233F" style="margin-left:4px;"><path d="M5 3.5v17l14-8.5z"></path></svg>
      </span>
      <sc-if value="{{ hasLabel }}">
        <span style="position:absolute;left:22px;bottom:18px;right:22px;text-align:left;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.16em;font-size:11px;color:#fff;text-shadow:0 1px 10px rgba(0,0,0,.5);">{{ label }}</span>
      </sc-if>
    </button>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:360},&quot;poster&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/ppf-corvette-side.jpg&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;src&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/trifecta-video.mp4&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { playing: false };
  renderVals() {
    const label = this.props.label || '';
    return {
      playing: this.state.playing,
      idle: !this.state.playing,
      poster: this.props.poster ?? 'assets/ppf-corvette-side.jpg',
      src: this.props.src ?? 'assets/trifecta-video.mp4',
      label: label,
      hasLabel: !!label,
      play: () => this.setState({ playing: true }),
    };
  }
}
</script>
</body>
</html>
